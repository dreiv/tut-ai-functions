<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock Data API Client</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 0 20px;
        line-height: 1.6;
        color: #333;
      }
      .actions {
        margin: 20px 0;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      button {
        padding: 12px 20px;
        font-size: 14px;
        cursor: pointer;
        border: 1px solid #ccc;
        border-radius: 6px;
        background-color: #f9f9f9;
        transition: all 0.2s;
      }
      button:hover {
        background-color: #e9e9e9;
      }
      #status {
        margin-top: 20px;
        padding: 15px;
        background: #f4f4f5;
        border-radius: 6px;
        font-family: monospace;
        white-space: pre-wrap;
        border: 1px solid #e4e4e7;
      }
    </style>
  </head>
  <body>
    <h1>Mock Data Explorer</h1>
    <p>
      Click the buttons below to interact with the mock backend data endpoints.
    </p>

    <div class="actions">
      <button id="btn-home">Get Welcome Message</button>
      <button id="btn-test">Get Test Verification</button>
      <button id="btn-data">Get Users List</button>
      <button id="btn-stats">Get Server Stats</button>
    </div>

    <h3>API Response Window:</h3>
    <div id="status">
      Ready. Select an action above to request data from the server.
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
